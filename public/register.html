<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticketing Platform - Auth</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1><a href="/" style="color:inherit;text-decoration:none;">EVenTix</a></h1>
        <nav>
            <a href="index.html">Events</a>
            <a href="register.html" class="guest-nav" style="color:var(--neon-accent);">Login / Register</a>
        </nav>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="glass-card" style="width: 100%; max-width: 400px;">
            
            <div style="display:flex; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border);">
                <button id="tab-login" class="btn-neon" style="flex:1; border:none; border-bottom: 2px solid var(--neon-accent); border-radius:0;">Login</button>
                <button id="tab-register" class="btn-neon" style="flex:1; border:none; border-radius:0; color: var(--text-muted);">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="reg-role">
                        <option value="attendee">Attendee (Buy Tickets)</option>
                        <option value="organizer">Organizer (Create Events)</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
            </form>

        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
